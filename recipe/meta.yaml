{% set version = "3.2.0" %}

package:
  name: chr3d
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  entry_points:
    - chr3d = chr3d.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.9
    - numpy >=1.21.0
    - pandas >=1.3.0
    - scipy >=1.7.0
    - biopython >=1.79
    - pysam >=0.19.0
    - tqdm >=4.62.0
    - bwa >=0.7.17
    - samtools >=1.10
    - macs3
    - pairtools
    - cooler
    - cooltools
    - parasail-python

test:
  imports:
    - chr3d
    - chr3d.cli
    - chr3d.peak_based.hichip_pipline
    - chr3d.peak_based.purifying
    - chr3d.peak_based.chiapet_pipeline
    - chr3d.hic.bulk_hic
  commands:
    - chr3d --help
    - chr3d bulk-hic --help
    - chr3d chia-pet --help
    - chr3d hichip --help
    - chr3d digest --help

about:
  home: https://github.com/rudrajoshi2481/Chr3D
  license: MIT
  license_file: LICENSE
  summary: "Chr3D: A Comprehensive Python Framework for Chromatin 3D Interactions Analysis"
  description: |
    Chr3D is a comprehensive bioinformatics toolkit for analysing chromatin
    3D interactions from Hi-C, HiChIP, and ChIA-PET data. It provides an
    end-to-end pipeline for alignment, quality control, loop and TAD calling,
    A/B compartment analysis, and visualisation.
  doc_url: https://github.com/rudrajoshi2481/Chr3D
  dev_url: https://github.com/rudrajoshi2481/Chr3D
