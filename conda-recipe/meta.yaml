{% set name = "chr3d" %}
{% set version = "3.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  entry_points:
    - chr3d = chr3d.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61.0
    - wheel

  run:
    - python >=3.9
    - numpy >=1.21.0
    - pandas >=1.3.0
    - scipy >=1.7.0
    - biopython >=1.79
    - pysam >=0.19.0
    - tqdm >=4.62.0
    - parasail-python
    - bwa
    - samtools
    - macs3
    - pairtools
    - cooler
    - cooltools

test:
  imports:
    - chr3d
  commands:
    - chr3d --help

about:
  home: https://github.com/rudrajoshi2481/Chr3D
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Chr3D: A Comprehensive Python Framework for Chromatin Interactions Analysis"
  description: |
    Chr3D is a comprehensive Python library for analyzing chromatin interaction 
    data from ChIA-PET, HiChIP, and Hi-C experiments. It provides a complete 
    pipeline from raw FASTQ files to statistically significant chromatin loops.
    
    Features:
    - Complete Pipeline: From raw FASTQ to significant chromatin loops
    - Dual Protocol Support: ChIA-PET and HiChIP analysis modes
    - Python API: Use as a library in your scripts or Jupyter notebooks
    - Statistical Rigor: Hypergeometric test with FDR correction
    - High Performance: SIMD-accelerated alignment (parasail), parallel processing
    - Modular Design: Run individual steps or the complete pipeline
  doc_url: https://github.com/rudrajoshi2481/Chr3D
  dev_url: https://github.com/rudrajoshi2481/Chr3D

extra:
  recipe-maintainers:
    - rudrajoshi2481
